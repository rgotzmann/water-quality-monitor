name: WaterRich CI/CD + Retrain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'      # retrain daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage to run'
        required: false
        default: 'all'
        type: choice
        options: [all, retrain, probe, ab_analysis]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/waterrich-api

jobs:
  # ── 1. Lint + Test + Coverage 
  test:
    name: Lint · Test · Coverage
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 pytest pytest-cov pandera scikit-learn \
                      pandas numpy joblib confluent-kafka fastapi \
                      uvicorn pyarrow requests

      - name: Lint
        run: |
          flake8 src/ tests/ --max-line-length=100 \
            --extend-ignore=E127,E221,E231,E261,E302,E303,E202,W391,E402

      - name: Test + Coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=70

  # ── 2. Build & Push image 
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'

    permissions:
      contents: read
      packages: write

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}

  # ── 3. Deploy 
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            -w "HTTP %{http_code}\n"

  # ── 4. Automated retraining (daily cron)
  retrain:
    name: Scheduled Retrain
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || inputs.stage == 'retrain' || inputs.stage == 'all'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install scikit-learn pandas numpy joblib pyarrow

      - name: Run retraining
        run: |
          if [ -f "data/usgs_water_quality.csv" ]; then
            python scripts/retrain.py
          else
            DATA_CSV=data/sample.csv python scripts/retrain.py
          fi
          
      - name: Commit new model version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model_registry/
          git diff --staged --quiet || \
            git commit -m "chore: automated retrain $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Hot-swap to new model
        run: |
          VERSION=$(python -c "import json; d=json.load(open('model_registry/latest.json')); print(d['version'])")
          curl -s -X POST \
            "${{ secrets.API_URL }}/switch?model=isolation_forest_${VERSION}" \
            -w "HTTP %{http_code}\n"

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-registry-${{ github.run_id }}
          path: model_registry/

  # ── 5. Probe (every 15 min)
  probe:
    name: API Probe
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || inputs.stage == 'probe' || inputs.stage == 'all'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests numpy confluent-kafka

      - name: Run probe
        env:
          API_URL:  ${{ secrets.API_URL }}
          N_PROBES: "10"
        run: python scripts/probe.py

      - name: Upload probe results
        uses: actions/upload-artifact@v4
        with:
          name: probe-${{ github.run_id }}
          path: probe_results.json

  # ── 6. A/B analysis
  ab_analysis:
    name: A/B Analysis
    runs-on: ubuntu-latest
    if: inputs.stage == 'ab_analysis' || inputs.stage == 'all'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Run A/B analysis
        env:
          API_URL: ${{ secrets.API_URL }}
        run: python scripts/ab_analysis.py --api $API_URL

      - name: Upload A/B results
        uses: actions/upload-artifact@v4
        with:
          name: ab-results-${{ github.run_id }}
          path: ab_results.json
